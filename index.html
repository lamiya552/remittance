<!DOCTYPE html>
<html lang="en">
<head>
    <title>Live Rate Calculator</title>
</head>
<body>

    <div class="container">
        <h1>Calculation Result</h1>
        <div id="display-area">
            <p class="loading">Fetching live data from NBLMT...</p>
        </div>
        <hr>
        <p class="details">Formula: (1,000 × Rate% × 102.5 - 10 × 31.7) / 1,000</p>
    </div>

    <script>
        async function getLiveRate() {
            const targetUrl = 'https://nblmt.com.my/display/ajax_rate.php';
            // We use an open proxy to bypass CORS restrictions
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const html = data.contents;

                // This regex looks for the number 31.16 specifically after "Bangladesh (account)"
                const regex = /Bangladesh \(account\).*?>(\d+\.\d+)</s;
                const match = html.match(regex);

                if (match && match[1]) {
                    const liveRate = parseFloat(match[1]); // This is your 31.16
                    
                    // YOUR FORMULA: (1000 * (Rate/100) * 102.5 - (10 * 31.7)) / 1000
                    const mathResult = (1000 * (liveRate / 100) * 102.5 - (10 * 31.7)) / 1000;

                    document.getElementById('display-area').innerHTML = `
                        <div class="result">${mathResult.toFixed(4)}</div>
                        <p>Current Rate: <b>${liveRate}</b></p>
                    `;
                } else {
                    throw new Error("Could not find the rate on the page.");
                }
            } catch (error) {
                document.getElementById('display-area').innerHTML = `
                    <p style="color:red;">Error: Could not load live data.</p>
                    <p>Check if the source site is up.</p>
                `;
                console.error(error);
            }
        }

        getLiveRate();
    </script>
</body>
</html>
